<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Tickets</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>
    
    <div class="wrapper">
        <!-- Sidebar -->
         <div class="sidebar">
            <h3 class="logo">🎫 Ticket Portal</h3>
            <ul>
                <li>
                    <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard </a>
                </li>
                <li>
                    <a href="tickets.html" class="active"><i class="fas fa-ticket-alt"></i>Tickets</a>
                </li>
                <li>
                    <a href="create-ticket.html"><i class="fas fa-plus-circle"></i>Create Ticket</a>

                </li>

                <li>
                    <a href="settings.html"><i class="fas fa-cog"></i>Settings</a>
                </li>
                <li>
                    <a href="index.html"><i class="fas fa-sign-out-alt"></i>Logout</a>
                </li>
            </ul>
        
        </div>
        
        <!-- Main Content -->
         
        <div class="main-content">
            <!-- Topbar -->
             
            <div class="topbar">
                <h2>All Tickets</h2>
                <div>
                    <button id="themeToggle" class="btn btn-dark"> 🌙 Dark Mode </button>
                    <a href="create-ticket.html" class="btn btn-success"><i class="fas fa-plus"></i> Create Ticket </a>
                </div>

            </div>
            
            <!-- Spinner -->
             
            <div id="spinner" class="text-center my-3 d-none">
                <div class="spinner-border text-primary"></div>
            </div>
            
            <!-- Search & Filter -->
             
            <div class="row mb-3">
                
                <div class="col-md-4">
                    <input type="text" id="searchInput" class="form-control" placeholder="Search Customer / Subject">
                </div>
                
                <div class="col-md-3">
                    <select id="statusFilter" class="form-select">
                        <option value="All"> All Status </option>
                        <option value="Open"> Open </option>
                        <option value="In Progress"> In Progress </option>
                        <option value="Closed"> Closed </option>
                    </select>
                </div>
                
                <div class="col-md-3">
                    <select id="sortTickets" class="form-select">
                        <option value="latest"> Latest </option>
                        <option value="oldest"> Oldest </option>
                        <option value="customer"> Customer Name </option>
                    </select>
                </div>
            </div>
            
            <!-- Tickets Table -->
             
            <div class="table-responsive">
                <table class="table table-bordered table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Customer</th>
                            <th>Email</th>
                            <th>Subject</th>
                            <th>Priority</th>
                            <th>Status</th>
                            <th>Created Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="ticketTable"><!-- Tickets will be loaded by tickets.js --></tbody>
                </table>
            </div>
            
            <!-- Empty State -->
             <div id="emptyState" class="text-center mt-4 d-none">
                <h4>No Tickets Available</h4>
                <p>Create your first support ticket.</p>
                <a href="create-ticket.html" class="btn btn-primary"> Create Ticket </a>
            </div>
            
            <!-- Pagination -->
             
            <nav class="mt-4">
                <ul class="pagination justify-content-center" id="pagination"> </ul>
            </nav> <br><br>
            
            
            <!-- Footer -->
             
            <footer class="text-center mt-4">
                <hr>
                <p>© 2026 Customer Support Portal </p>
            </footer>

    </div>

</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/api.js"></script>

<script src="js/tickets.js"></script>

<script src="js/theme.js"></script>

</body>

</html>
