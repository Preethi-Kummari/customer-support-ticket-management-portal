<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Support Portal - Login</title>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="login-page">

<div class="container">
    <div class="row justify-content-center align-items-center vh-100">

        <div class="col-lg-5 col-md-7">

            <div class="card shadow border-0 rounded-4">

                <div class="card-body p-5">

                    <div class="text-center mb-4">

                        <i class="fa-solid fa-headset text-primary display-4"></i>

                        <h2 class="mt-3 fw-bold"> Customer Support Portal </h2>

                        <p class="text-muted"> Login to manage customer support tickets </p>

                    </div>

                    <!-- Loading Spinner -->
                    <div id="spinner" class="text-center d-none mb-3">
                        <div class="spinner-border text-primary"></div>
                    </div>

                    <!-- Success Alert -->
                    <div id="successMsg" class="alert alert-success d-none"> Login Successful! </div>

                    <!-- Login Form -->
                    <form id="loginForm">

                        <div class="mb-3">

                            <label class="form-label"> Email Address </label>

                            <input type="email" id="email" class="form-control" placeholder="Enter your email">

                            <small id="emailError" class="text-danger"> </small>

                        </div>

                        <div class="mb-4">

                            <label class="form-label"> Password </label>

                            <input type="password" id="password" class="form-control" placeholder="Enter your password">

                            <small id="passwordError" class="text-danger"> </small>

                        </div>

                        <button class="btn btn-primary w-100" type="submit"><i class="fa-solid fa-right-to-bracket"></i> Login </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/index.js"></script>

</body>
</html>
