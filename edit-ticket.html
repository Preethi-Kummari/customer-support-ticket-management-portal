<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Ticket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">

</head>

<body>
    
    <div class="wrapper">
        <!-- Sidebar -->
         <div class="sidebar">
            <h3 class="logo">🎫 Ticket Portal</h3>
            <ul>
                <li>
                    <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard </a>
                </li>
                <li>
                    <a href="tickets.html"><i class="fas fa-ticket-alt"></i> Tickets</a>
                </li>
                <li>
                    <a href="create-ticket.html"><i class="fas fa-plus-circle"></i> Create Ticket </a>
                </li>
                <li>
                    <a href="settings.html"> <i class="fas fa-cog"></i> Settings </a>
                </li>
                <li>
                    <a href="index.html"> <i class="fas fa-sign-out-alt"></i> Logout </a>
                </li>
            </ul>
        </div>
        
        <!-- Main Content -->
         
        <div class="main-content">
            <div class="topbar">
                <h2>Edit Ticket</h2>
                <button id="themeToggle" class="btn btn-dark"> 🌙 Dark Mode </button>
            </div>
            
            <!-- Spinner -->
            <div id="spinner" class="text-center my-3 d-none">
                <div class="spinner-border text-primary">

                </div>
            </div>
            
            <!-- Edit Form -->
             <div class="ticket-form-card">
                <form id="editForm">
                    <div class="row">
                        <div class="col-md-6">
                            <label class="form-label"> Customer Name </label>
                            <input type="text" id="customerName" class="form-control" placeholder="Enter Customer Name">
                            <small id="customerError" class="text-danger"></small>
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label"> Email </label>
                            <input type="email" id="email" class="form-control" placeholder="Enter Email">
                            <small id="emailError" class="text-danger"></small>
                        </div>
                    </div>
                    
                    <div class="mt-3">
                        <label class="form-label"> Subject </label>
                        <input type="text" id="subject" class="form-control" placeholder="Enter Subject">
                        <small id="subjectError" class="text-danger"></small>
                    </div>
                    
                    
                    <div class="mt-3">
                        <label class="form-label"> Description </label>
                        <textarea id="description" rows="5" maxlength="500" class="form-control" placeholder="Enter Description"></textarea>
                        <small id="charCount"> 0 / 500 Characters </small>
                        <small id="descriptionError" class="text-danger"></small>
                    </div>
                    
                    <div class="row mt-3">
                        <div class="col-md-6">
                            <label class="form-label"> Priority </label>
                            <select id="priority" class="form-select">
                                <option value="Low">🟢 Low</option>
                                <option value="Medium">🟡 Medium</option>
                                <option value="High">🔴 High</option>
                            </select>
                            <small id="priorityError" class="text-danger"></small>
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label"> Status </label>
                            <select id="status" class="form-select">
                                <option value="Open"> Open </option>
                                <option value="In Progress"> In Progress </option>
                                <option value="Closed"> Closed </option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Update Ticket </button>
                        <a href="tickets.html" class="btn btn-secondary"> Cancel </a>
                    </div>
                </form>
            </div>
            
            <!-- Success Toast -->
             <div class="toast position-fixed top-0 end-0 m-3 text-bg-success" id="successToast">
                <div class="toast-header">
                    <strong class="me-auto"> Success </strong>
                    <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
                </div>
                
                <div class="toast-body"> Ticket Updated Successfully! </div>
            </div>
            
            <footer class="text-center mt-4">
                <hr>
                <p> © 2026 Customer Support Portal </p>
            </footer>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/api.js"></script>

<script src="js/edit-ticket.js"></script>

<script src="js/theme.js"></script>

</body>

</html>
